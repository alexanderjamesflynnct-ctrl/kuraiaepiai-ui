<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded White Background -->
  <rect width="32" height="32" rx="8" fill="#ffffff" />
  
  <!-- "ク" Katakana Glyph -->
  
  <!-- 1. Left Stroke: Starts higher (y=6) to protrude through the top bar (y=10) -->
  <path 
    d="M14 6 L8 19" 
    fill="none" 
    stroke="#9333ea" 
    stroke-width="3.5" 
    stroke-linecap="round" 
  />
  
  <!-- 2. Main Body: Horizontal bar at y=10, then a curved sweep to the bottom-left -->
  <path 
    d="M10 10 H25 Q 25 18 12 27" 
    fill="none" 
    stroke="#9333ea" 
    stroke-width="3.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>